# Blueprint Render — deploy automat al backend-ului FastAPI.
# In Render: New > Blueprint > conecteaza repo-ul GitHub > se citeste acest fisier.
services:
  - type: web
    name: eurostat-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # se introduce manual in dashboard (secret)
      - key: ALLOWED_ORIGINS
        sync: false          # ex: https://eurostat-explorer.vercel.app
      - key: PYTHON_VERSION
        value: "3.12.4"
